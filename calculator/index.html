<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>高级计算器</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔢</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #0f0f1a; --surface: #1a1a2e; --card: #252540;
            --primary: #4fc3f7; --green: #81c784; --orange: #ffb74d; --red: #ef5350;
            --text: #fff; --text2: #8888aa; --border: #333355;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }
        /* Header */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
        }
        .header h1 { font-size: 18px; font-weight: 600; }
        .tabs { display: flex; gap: 4px; overflow-x: auto; padding: 8px 12px; background: var(--surface); }
        .tab {
            padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
            background: var(--card); color: var(--text2); cursor: pointer; white-space: nowrap; border: none;
            transition: all 0.2s;
        }
        .tab.active { background: var(--primary); color: var(--bg); }

        /* Panels */
        .panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
        .panel.active { display: flex; }

        /* Calculator Display */
        .display {
            padding: 20px; background: var(--surface); margin: 12px; border-radius: 16px;
            min-height: 120px; display: flex; flex-direction: column; justify-content: flex-end;
        }
        .display .expr { font-size: 16px; color: var(--text2); text-align: right; min-height: 24px; word-break: break-all; }
        .display .result { font-size: 42px; font-weight: 700; text-align: right; margin-top: 8px; }

        /* Keypad */
        .keypad {
            flex: 1; display: grid; gap: 8px; padding: 0 12px 12px;
            grid-template-rows: repeat(5, 1fr);
            grid-template-columns: repeat(4, 1fr);
        }
        .btn {
            border: none; border-radius: 14px; font-size: 20px; font-weight: 600;
            cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
            background: var(--card); color: var(--text);
        }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .btn.op { background: rgba(79,195,247,0.2); color: var(--primary); }
        .btn.fn { background: rgba(255,183,77,0.2); color: var(--orange); font-size: 16px; }
        .btn.eq { background: var(--primary); color: var(--bg); font-size: 24px; }
        .btn.danger { background: rgba(239,83,80,0.2); color: var(--red); }

        /* Scientific Keypad */
        .sci-keypad {
            flex: 1; display: grid; gap: 6px; padding: 0 12px 12px;
            grid-template-rows: repeat(8, 1fr);
            grid-template-columns: repeat(5, 1fr);
        }
        .sci-keypad .btn { font-size: 14px; }

        /* Graph */
        .graph-area { flex: 1; position: relative; }
        .graph-area canvas { width: 100%; height: 100%; }
        .graph-controls {
            padding: 12px; background: var(--surface); margin: 12px; border-radius: 12px;
        }
        .graph-controls input {
            width: 100%; padding: 10px; background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 15px; margin: 4px 0;
        }
        .graph-controls button {
            width: 100%; padding: 12px; background: var(--primary); color: var(--bg);
            border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
            cursor: pointer; margin-top: 8px;
        }

        /* Equation */
        .eq-panel { padding: 16px; overflow-y: auto; }
        .eq-type { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .eq-type button {
            padding: 8px 16px; border-radius: 20px; background: var(--card); color: var(--text2);
            border: none; cursor: pointer; font-size: 13px;
        }
        .eq-type button.active { background: var(--primary); color: var(--bg); }
        .eq-input { margin-bottom: 12px; }
        .eq-input label { display: block; color: var(--text2); font-size: 13px; margin-bottom: 4px; }
        .eq-input input {
            width: 100%; padding: 10px; background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 15px;
        }
        .eq-result {
            padding: 16px; background: var(--surface); border-radius: 12px; margin-top: 16px;
            font-size: 16px; line-height: 1.8;
        }

        /* Converter */
        .conv-panel { padding: 16px; overflow-y: auto; }
        .conv-category { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
        .conv-category button {
            padding: 6px 12px; border-radius: 16px; background: var(--card); color: var(--text2);
            border: none; cursor: pointer; font-size: 12px;
        }
        .conv-category button.active { background: var(--primary); color: var(--bg); }
        .conv-row { margin-bottom: 12px; }
        .conv-row label { display: block; color: var(--text2); font-size: 13px; margin-bottom: 4px; }
        .conv-row select, .conv-row input {
            width: 100%; padding: 10px; background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 15px;
        }
        .conv-swap {
            display: flex; justify-content: center; margin: 12px 0;
        }
        .conv-swap button {
            padding: 10px 24px; background: var(--card); color: var(--primary); border: none;
            border-radius: 20px; font-size: 18px; cursor: pointer;
        }
        .conv-result {
            padding: 16px; background: var(--surface); border-radius: 12px;
            font-size: 24px; font-weight: 700; color: var(--green); text-align: center;
        }

        /* History */
        .history-panel { padding: 12px; overflow-y: auto; }
        .history-item {
            padding: 14px; background: var(--surface); border-radius: 12px; margin-bottom: 8px;
            cursor: pointer; transition: all 0.2s;
        }
        .history-item:active { opacity: 0.8; }
        .history-item .h-expr { font-size: 13px; color: var(--text2); }
        .history-item .h-result { font-size: 22px; font-weight: 700; color: var(--green); margin-top: 4px; }
        .history-item .h-time { font-size: 11px; color: var(--text2); margin-top: 4px; }
        .history-empty { text-align: center; color: var(--text2); padding: 40px; }

        /* Responsive */
        @media (min-width: 768px) {
            body { max-width: 420px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1>高级计算器</h1>
        <span id="modeLabel" style="color:var(--green);font-size:12px">DEG</span>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" onclick="showPanel('basic')">基础</button>
        <button class="tab" onclick="showPanel('scientific')">科学</button>
        <button class="tab" onclick="showPanel('graph')">绘图</button>
        <button class="tab" onclick="showPanel('equation')">方程</button>
        <button class="tab" onclick="showPanel('converter')">转换</button>
        <button class="tab" onclick="showPanel('history')">历史</button>
    </div>

    <!-- Basic Calculator -->
    <div id="basic" class="panel active">
        <div class="display">
            <div class="expr" id="basicExpr"></div>
            <div class="result" id="basicResult">0</div>
        </div>
        <div class="keypad">
            <button class="btn danger" onclick="calc.clear()">AC</button>
            <button class="btn fn" onclick="calc.backspace()">⌫</button>
            <button class="btn fn" onclick="calc.percent()">%</button>
            <button class="btn op" onclick="calc.op('/')">÷</button>
            <button class="btn" onclick="calc.digit('7')">7</button>
            <button class="btn" onclick="calc.digit('8')">8</button>
            <button class="btn" onclick="calc.digit('9')">9</button>
            <button class="btn op" onclick="calc.op('*')">×</button>
            <button class="btn" onclick="calc.digit('4')">4</button>
            <button class="btn" onclick="calc.digit('5')">5</button>
            <button class="btn" onclick="calc.digit('6')">6</button>
            <button class="btn op" onclick="calc.op('-')">−</button>
            <button class="btn" onclick="calc.digit('1')">1</button>
            <button class="btn" onclick="calc.digit('2')">2</button>
            <button class="btn" onclick="calc.digit('3')">3</button>
            <button class="btn op" onclick="calc.op('+')">+</button>
            <button class="btn fn" onclick="calc.negate()">±</button>
            <button class="btn" onclick="calc.digit('0')">0</button>
            <button class="btn" onclick="calc.dot()">.</button>
            <button class="btn eq" onclick="calc.equals()">=</button>
        </div>
    </div>

    <!-- Scientific Calculator -->
    <div id="scientific" class="panel">
        <div class="display">
            <div class="expr" id="sciExpr"></div>
            <div class="result" id="sciResult">0</div>
        </div>
        <div class="sci-keypad">
            <button class="btn fn" id="btnShift" onclick="calc.toggleShift()">2nd</button>
            <button class="btn fn" onclick="calc.insertConst('π')">π</button>
            <button class="btn fn" onclick="calc.insertConst('e')">e</button>
            <button class="btn danger" onclick="calc.clear()">AC</button>
            <button class="btn fn" onclick="calc.backspace()">⌫</button>

            <button class="btn fn" id="btnSin" onclick="calc.func('sin')">sin</button>
            <button class="btn fn" id="btnCos" onclick="calc.func('cos')">cos</button>
            <button class="btn fn" id="btnTan" onclick="calc.func('tan')">tan</button>
            <button class="btn op" onclick="calc.paren('(')">(</button>
            <button class="btn op" onclick="calc.paren(')')">)</button>

            <button class="btn fn" id="btnLn" onclick="calc.func('ln')">ln</button>
            <button class="btn fn" id="btnLog" onclick="calc.func('log')">log</button>
            <button class="btn fn" onclick="calc.func('sqrt')">√</button>
            <button class="btn op" onclick="calc.square()">x²</button>
            <button class="btn op" onclick="calc.op('^')">x^y</button>

            <button class="btn fn" onclick="calc.reciprocal()">1/x</button>
            <button class="btn fn" onclick="calc.func('abs')">|x|</button>
            <button class="btn fn" onclick="calc.factorial()">n!</button>
            <button class="btn" onclick="calc.digit('7')">7</button>
            <button class="btn" onclick="calc.digit('8')">8</button>

            <button class="btn fn" onclick="calc.percent()">%</button>
            <button class="btn op" onclick="calc.op('/')">÷</button>
            <button class="btn op" onclick="calc.op('*')">×</button>
            <button class="btn" onclick="calc.digit('9')">9</button>
            <button class="btn" onclick="calc.digit('4')">4</button>

            <button class="btn fn" id="btnAngle" onclick="calc.toggleAngle()">DEG</button>
            <button class="btn" onclick="calc.digit('5')">5</button>
            <button class="btn" onclick="calc.digit('6')">6</button>
            <button class="btn op" onclick="calc.op('-')">−</button>
            <button class="btn op" onclick="calc.op('+')">+</button>

            <button class="btn fn" onclick="calc.exp()">eˣ</button>
            <button class="btn fn" onclick="calc.func('ceil')">⌈x⌉</button>
            <button class="btn fn" onclick="calc.func('floor')">⌊x⌋</button>
            <button class="btn" onclick="calc.digit('1')">1</button>
            <button class="btn" onclick="calc.digit('2')">2</button>

            <button class="btn fn" onclick="calc.negate()">±</button>
            <button class="btn" onclick="calc.digit('0')">0</button>
            <button class="btn" onclick="calc.dot()">.</button>
            <button class="btn" onclick="calc.digit('3')">3</button>
            <button class="btn eq" onclick="calc.equals()">=</button>
        </div>
    </div>

    <!-- Graphing -->
    <div id="graph" class="panel">
        <div class="graph-controls">
            <input id="graphFunc" type="text" placeholder="f(x) = sin(x)" value="sin(x)">
            <div style="display:flex;gap:8px">
                <input id="xMin" type="number" value="-10" placeholder="X min" style="width:50%">
                <input id="xMax" type="number" value="10" placeholder="X max" style="width:50%">
            </div>
            <button onclick="drawGraph()">绘制图像</button>
        </div>
        <div class="graph-area">
            <canvas id="graphCanvas"></canvas>
        </div>
    </div>

    <!-- Equation Solver -->
    <div id="equation" class="panel eq-panel">
        <div class="eq-type">
            <button class="active" onclick="setEqType('linear',this)">一元一次</button>
            <button onclick="setEqType('quadratic',this)">一元二次</button>
            <button onclick="setEqType('system',this)">二元一次</button>
        </div>
        <div id="eqInputs"></div>
        <button style="width:100%;padding:14px;background:var(--primary);color:var(--bg);border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer" onclick="solveEquation()">求解</button>
        <div class="eq-result" id="eqResult">输入系数后点击求解</div>
    </div>

    <!-- Unit Converter -->
    <div id="converter" class="panel conv-panel">
        <div class="conv-category" id="convCats"></div>
        <div class="conv-row">
            <label>从</label>
            <div style="display:flex;gap:8px">
                <input id="convFrom" type="number" value="1" oninput="doConvert()">
                <select id="convFromUnit" onchange="doConvert()"></select>
            </div>
        </div>
        <div class="conv-swap"><button onclick="swapConv()">⇅</button></div>
        <div class="conv-row">
            <label>到</label>
            <div style="display:flex;gap:8px">
                <input id="convTo" type="text" readonly style="background:var(--surface);color:var(--green);font-weight:700">
                <select id="convToUnit" onchange="doConvert()"></select>
            </div>
        </div>
    </div>

    <!-- History -->
    <div id="history" class="panel history-panel">
        <div id="historyList" class="history-empty">暂无计算记录</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
