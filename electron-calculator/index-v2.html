<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级计算器</title>
    <link rel="stylesheet" href="src/styles/design-system.css">
    <style>
        /* 保持原有功能样式兼容 */
        .eq-panel { padding: 0; }
        .eq-type { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
        .eq-type button { padding: 8px 16px; border-radius: 999px; background: var(--color-bg-surface); color: var(--color-text-secondary); border: 1px solid var(--color-border); cursor: pointer; font-size: 13px; transition: all 0.15s ease; font-weight: 500; font-family: var(--font-ui); white-space: nowrap; }
        .eq-type button:hover { border-color: var(--color-border-active); color: var(--color-text-primary); background: var(--color-accent-surface); }
        .eq-type button.active { background: var(--color-accent); color: #fff; border-color: transparent; box-shadow: 0 4px 12px var(--color-accent-glow); }
        .eq-input { margin-bottom: 16px; }
        .eq-input label { display: block; color: var(--color-text-secondary); font-size: 13px; margin-bottom: 6px; font-weight: 500; }
        .eq-input input, .eq-input select { width: 100%; padding: 12px 16px; background: var(--color-bg-surface); border: 1px solid var(--color-border); border-radius: 8px; color: var(--color-text-primary); font-size: 15px; font-family: var(--font-ui); transition: all 0.15s ease; outline: none; }
        .eq-input input:focus, .eq-input select:focus { border-color: var(--color-accent); box-shadow: 0 0 0 3px var(--color-accent-glow); }
        .input-desc { font-size: 11px; color: var(--color-text-tertiary); margin-top: 2px; padding: 0 4px; line-height: 1.4; }
        .eq-input label + .input-desc { margin-top: -2px; margin-bottom: 6px; }
        .graph-area { flex: 1; position: relative; cursor: crosshair; background: var(--color-bg-surface); border-radius: 16px; border: 1px solid var(--color-border); overflow: hidden; min-height: 300px; }
        .graph-area canvas { width: 100%; height: 100%; }
        .graph-controls { padding: 16px; background: var(--color-bg-surface); border-radius: 12px; border: 1px solid var(--color-border); box-shadow: var(--shadow-sm); margin-bottom: 16px; }
        .graph-controls input { width: 100%; padding: 12px; background: var(--color-bg-base); border: 1px solid var(--color-border); border-radius: 8px; color: var(--color-text-primary); font-size: 15px; margin: 6px 0; transition: all 0.15s ease; font-family: var(--font-ui); outline: none; }
        .graph-controls input:focus { border-color: var(--color-accent); box-shadow: 0 0 0 3px var(--color-accent-glow); }
        .graph-btn { width: 100%; padding: 14px; background: var(--btn-equals-bg); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 12px; transition: all 0.15s ease; box-shadow: var(--shadow-glow); font-family: var(--font-ui); }
        .graph-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--color-accent-glow); }
        .graph-info { position: absolute; bottom: 12px; left: 12px; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 8px 14px; border-radius: 8px; font-size: 12px; color: var(--color-text-tertiary); pointer-events: none; border: 1px solid var(--glass-border); }
        .graph-ctrl-btn { flex: 1; padding: 10px; background: var(--color-bg-surface); border: 1px solid var(--color-border); border-radius: 8px; color: var(--color-text-primary); cursor: pointer; font-size: 13px; transition: all 0.15s ease; font-weight: 500; font-family: var(--font-ui); }
        .graph-ctrl-btn:hover { border-color: var(--color-border-active); background: var(--color-accent-surface); }
        .graph-input-row { display: flex; gap: 8px; }
        .graph-input-row input { flex: 1; }
        .conv-input-row { display: flex; gap: 8px; }
        .conv-input-row input, .conv-input-row select { flex: 1; }
        .conv-result-input { background: var(--color-bg-sunken) !important; color: var(--color-green) !important; font-weight: 700 !important; }
        .conv-panel { padding: 0; }
        .conv-category { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
        .conv-category button { padding: 8px 16px; border-radius: 999px; background: var(--color-bg-surface); color: var(--color-text-secondary); border: 1px solid var(--color-border); cursor: pointer; font-size: 13px; transition: all 0.15s ease; font-family: var(--font-ui); }
        .conv-category button:hover { border-color: var(--color-border-active); color: var(--color-text-primary); }
        .conv-category button.active { background: var(--color-accent); color: #fff; border-color: transparent; box-shadow: 0 4px 12px var(--color-accent-glow); }
        .conv-row { margin-bottom: 16px; }
        .conv-row label { display: block; color: var(--color-text-secondary); font-size: 13px; margin-bottom: 6px; font-weight: 500; }
        .conv-row select, .conv-row input { width: 100%; padding: 12px 16px; background: var(--color-bg-surface); border: 1px solid var(--color-border); border-radius: 8px; color: var(--color-text-primary); font-size: 15px; transition: all 0.15s ease; font-family: var(--font-ui); outline: none; }
        .conv-row select:focus, .conv-row input:focus { border-color: var(--color-accent); box-shadow: 0 0 0 3px var(--color-accent-glow); }
        .conv-result { padding: 20px; background: var(--color-bg-surface); border-radius: 12px; font-size: 28px; font-weight: 700; color: var(--color-green); text-align: center; box-shadow: var(--shadow-sm); border: 1px solid var(--color-border); font-family: var(--font-mono); }
        .formula-box { background: var(--color-accent-surface); border: 1px solid var(--color-border-active); border-radius: 12px; padding: 12px 16px; margin: 8px 0; font-family: var(--font-mono); font-size: 13px; color: var(--color-accent-light); line-height: 1.8; }
        .formula-box .formula-title { font-weight: 600; color: var(--color-orange); font-size: 12px; margin-bottom: 4px; font-family: inherit; }
        .process-box { background: var(--color-green-surface); border: 1px solid rgba(52,199,89,0.2); border-radius: 12px; padding: 12px 16px; margin: 8px 0; font-size: 13px; color: var(--color-text-secondary); line-height: 1.8; }
        .process-box .step { color: var(--color-text-primary); }
        .three-d-controls { display: flex; gap: 8px; padding: 8px 0; flex-wrap: wrap; align-items: center; }
        .three-d-controls label { font-size: 12px; color: var(--color-text-secondary); margin-right: 2px; }
        .three-d-controls input[type="text"] { flex: 1; min-width: 120px; padding: 8px 12px; background: var(--color-bg-surface); border: 1px solid var(--color-border); border-radius: 8px; color: var(--color-text-primary); font-size: 14px; font-family: var(--font-mono); outline: none; }
        .three-d-controls input[type="text"]:focus { border-color: var(--color-accent); box-shadow: 0 0 0 3px var(--color-accent-glow); }
        .relation-chain { display: flex; align-items: center; gap: 10px; margin: 12px 0; flex-wrap: wrap; }
        .relation-chain select { padding: 10px 14px; background: var(--color-bg-surface); border: 1px solid var(--color-border); border-radius: 8px; color: var(--color-text-primary); font-size: 14px; transition: all 0.15s ease; font-family: var(--font-ui); outline: none; }
        .relation-chain select:focus { border-color: var(--color-accent); box-shadow: 0 0 0 3px var(--color-accent-glow); }
        .relation-arrow { color: var(--color-accent); font-size: 18px; font-weight: bold; }
        .relation-btns { display: flex; gap: 10px; margin: 12px 0; }
        .relation-btns button { padding: 8px 18px; border-radius: 8px; border: 1px solid var(--color-border); background: var(--color-bg-surface); color: var(--color-text-primary); cursor: pointer; font-size: 13px; transition: all 0.15s ease; font-weight: 500; font-family: var(--font-ui); }
        .relation-btns button:hover { border-color: var(--color-border-active); background: var(--color-accent-surface); }
        .canvas-container { background: var(--color-bg-surface); border-radius: 16px; border: 1px solid var(--color-border); overflow: hidden; position: relative; box-shadow: var(--shadow-sm); min-height: 280px; margin-bottom: 16px; }
        .canvas-container canvas { display: block; width: 100%; }
        #threeDCanvas { cursor: grab; touch-action: none; min-height: 360px; }
        #threeDCanvas:active { cursor: grabbing; }
        #3d .eq-type { position: relative; z-index: 999; }
        #3d .eq-type button { position: relative; z-index: 999; }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- 侧边栏遮罩 (移动端) -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <!-- 侧边栏导航 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">
                    <span class="icon">🧮</span>
                    高级计算器
                </span>
                <button class="theme-toggle" id="themeToggle" onclick="cycleTheme()" title="切换主题 (T)">🌙</button>
            </div>

            <nav class="sidebar-nav" role="navigation" aria-label="计算模块导航">
                <!-- 基础计算 -->
                <div class="nav-category">
                    <div class="nav-category-label">基础计算</div>
                    <button class="nav-item active" data-panel="basic" role="tab" aria-selected="true">
                        <span class="emoji">🔢</span> 基础
                    </button>
                    <button class="nav-item" data-panel="scientific" role="tab" aria-selected="false">
                        <span class="emoji">🔬</span> 科学计算
                    </button>
                </div>

                <!-- 可视化 -->
                <div class="nav-category">
                    <div class="nav-category-label">可视化</div>
                    <button class="nav-item" data-panel="graph" role="tab" aria-selected="false">
                        <span class="emoji">📈</span> 2D 绘图
                    </button>
                    <button class="nav-item" data-panel="geometry" role="tab" aria-selected="false">
                        <span class="emoji">📐</span> 几何图形
                    </button>
                    <button class="nav-item" data-panel="3d" role="tab" aria-selected="false">
                        <span class="emoji">🌐</span> 3D 可视化
                    </button>
                </div>

                <!-- 高等数学 -->
                <div class="nav-category">
                    <div class="nav-category-label">高等数学</div>
                    <button class="nav-item" data-panel="equation" role="tab" aria-selected="false">
                        <span class="emoji">⚖️</span> 方程求解
                    </button>
                    <button class="nav-item" data-panel="matrix" role="tab" aria-selected="false">
                        <span class="emoji">📊</span> 矩阵运算
                    </button>
                    <button class="nav-item" data-panel="calculus" role="tab" aria-selected="false">
                        <span class="emoji">∫</span> 微积分
                    </button>
                    <button class="nav-item" data-panel="statistics" role="tab" aria-selected="false">
                        <span class="emoji">🎲</span> 概率统计
                    </button>
                    <button class="nav-item" data-panel="numbertheory" role="tab" aria-selected="false">
                        <span class="emoji">🔢</span> 数论
                    </button>
                    <button class="nav-item" data-panel="algebra" role="tab" aria-selected="false">
                        <span class="emoji">🔣</span> 代数运算
                    </button>
                    <button class="nav-item" data-panel="appliedmath" role="tab" aria-selected="false">
                        <span class="emoji">⚙️</span> 应用数学
                    </button>
                </div>

                <!-- 工具 -->
                <div class="nav-category">
                    <div class="nav-category-label">实用工具</div>
                    <button class="nav-item" data-panel="fun" role="tab" aria-selected="false">
                        <span class="emoji">🎯</span> 趣味计算
                    </button>
                    <button class="nav-item" data-panel="converter" role="tab" aria-selected="false">
                        <span class="emoji">🔄</span> 单位转换
                    </button>
                    <button class="nav-item" data-panel="history" role="tab" aria-selected="false">
                        <span class="emoji">📜</span> 历史记录
                    </button>
                </div>
            </nav>

            <div class="shortcut-hint">
                <kbd>T</kbd> 切换主题 &nbsp; <kbd>1</kbd>-<kbd>9</kbd> 快速导航
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部栏 -->
            <header class="top-bar">
                <div style="display:flex;align-items:center;gap:12px">
                    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()" aria-label="打开菜单">☰</button>
                    <span class="top-bar-title" id="panelTitle">基础计算</span>
                </div>
                <div class="top-bar-actions">
                    <span id="modeLabel" class="mode-badge">DEG</span>
                </div>
            </header>

            <!-- 面板容器 -->
            <div class="panel-container">

                <!-- ==================== 基础计算 ==================== -->
                <div id="basic" class="panel active">
                    <div class="calc-display">
                        <div class="expr" id="basicExpr"></div>
                        <div class="result" id="basicResult">0</div>
                    </div>
                    <div class="keypad">
                        <button class="btn danger" onclick="calc.clear()">AC</button>
                        <button class="btn fn" onclick="calc.backspace()">⌫</button>
                        <button class="btn fn" onclick="calc.percent()">%</button>
                        <button class="btn op" onclick="calc.op('/')">÷</button>
                        <button class="btn" onclick="calc.digit('7')">7</button>
                        <button class="btn" onclick="calc.digit('8')">8</button>
                        <button class="btn" onclick="calc.digit('9')">9</button>
                        <button class="btn op" onclick="calc.op('*')">×</button>
                        <button class="btn" onclick="calc.digit('4')">4</button>
                        <button class="btn" onclick="calc.digit('5')">5</button>
                        <button class="btn" onclick="calc.digit('6')">6</button>
                        <button class="btn op" onclick="calc.op('-')">−</button>
                        <button class="btn" onclick="calc.digit('1')">1</button>
                        <button class="btn" onclick="calc.digit('2')">2</button>
                        <button class="btn" onclick="calc.digit('3')">3</button>
                        <button class="btn op" onclick="calc.op('+')">+</button>
                        <button class="btn fn" onclick="calc.negate()">±</button>
                        <button class="btn" onclick="calc.digit('0')">0</button>
                        <button class="btn" onclick="calc.dot()">.</button>
                        <button class="btn eq" onclick="calc.equals()">=</button>
                    </div>
                </div>

                <!-- ==================== 科学计算 ==================== -->
                <div id="scientific" class="panel">
                    <div class="calc-display">
                        <div class="expr" id="sciExpr"></div>
                        <div class="result" id="sciResult">0</div>
                    </div>
                    <div class="sci-keypad">
                        <button class="btn fn" id="btnShift" onclick="calc.toggleShift()">2nd</button>
                        <button class="btn fn" onclick="calc.insertConst('π')">π</button>
                        <button class="btn fn" onclick="calc.insertConst('e')">e</button>
                        <button class="btn danger" onclick="calc.clear()">AC</button>
                        <button class="btn fn" onclick="calc.backspace()">⌫</button>
                        <button class="btn fn" id="btnSin" onclick="calc.func('sin')">sin</button>
                        <button class="btn fn" id="btnCos" onclick="calc.func('cos')">cos</button>
                        <button class="btn fn" id="btnTan" onclick="calc.func('tan')">tan</button>
                        <button class="btn op" onclick="calc.paren('(')">(</button>
                        <button class="btn op" onclick="calc.paren(')')">)</button>
                        <button class="btn fn" id="btnLn" onclick="calc.func('ln')">ln</button>
                        <button class="btn fn" id="btnLog" onclick="calc.func('log')">log</button>
                        <button class="btn fn" onclick="calc.func('sqrt')">√</button>
                        <button class="btn op" onclick="calc.square()">x²</button>
                        <button class="btn op" onclick="calc.op('^')">x^y</button>
                        <button class="btn fn" onclick="calc.reciprocal()">1/x</button>
                        <button class="btn fn" onclick="calc.func('abs')">|x|</button>
                        <button class="btn fn" onclick="calc.factorial()">n!</button>
                        <button class="btn" onclick="calc.digit('7')">7</button>
                        <button class="btn" onclick="calc.digit('8')">8</button>
                        <button class="btn fn" onclick="calc.percent()">%</button>
                        <button class="btn op" onclick="calc.op('/')">÷</button>
                        <button class="btn op" onclick="calc.op('*')">×</button>
                        <button class="btn" onclick="calc.digit('9')">9</button>
                        <button class="btn" onclick="calc.digit('4')">4</button>
                        <button class="btn fn" id="btnAngle" onclick="calc.toggleAngle()">DEG</button>
                        <button class="btn" onclick="calc.digit('5')">5</button>
                        <button class="btn" onclick="calc.digit('6')">6</button>
                        <button class="btn op" onclick="calc.op('-')">−</button>
                        <button class="btn op" onclick="calc.op('+')">+</button>
                        <button class="btn fn" onclick="calc.exp()">eˣ</button>
                        <button class="btn fn" onclick="calc.func('ceil')">⌈x⌉</button>
                        <button class="btn fn" onclick="calc.func('floor')">⌊x⌋</button>
                        <button class="btn" onclick="calc.digit('1')">1</button>
                        <button class="btn" onclick="calc.digit('2')">2</button>
                        <button class="btn fn" onclick="calc.negate()">±</button>
                        <button class="btn" onclick="calc.digit('0')">0</button>
                        <button class="btn" onclick="calc.dot()">.</button>
                        <button class="btn" onclick="calc.digit('3')">3</button>
                        <button class="btn eq" onclick="calc.equals()">=</button>
                    </div>
                </div>

                <!-- ==================== 2D 绘图 ==================== -->
                <div id="graph" class="panel">
                    <div class="graph-controls">
                        <input id="graphFunc" type="text" placeholder="f(x) = sin(x)" value="sin(x)">
                        <div class="graph-input-row">
                            <input id="xMin" type="number" value="-10">
                            <input id="xMax" type="number" value="10">
                        </div>
                        <button class="graph-btn" onclick="graphView.syncFromInputs();drawGraph()">绘制图像</button>
                        <div style="display:flex;gap:8px;margin-top:8px">
                            <button class="graph-ctrl-btn" onclick="graphZoom(1.5)">+ 放大</button>
                            <button class="graph-ctrl-btn" onclick="graphZoom(0.67)">- 缩小</button>
                            <button class="graph-ctrl-btn" onclick="graphReset()">重置</button>
                        </div>
                    </div>
                    <div class="graph-area">
                        <canvas id="graphCanvas"></canvas>
                        <div class="graph-info">滚轮缩放 | 拖拽平移 | 双击重置</div>
                    </div>
                </div>

                <!-- ==================== 方程求解 ==================== -->
                <div id="equation" class="panel eq-panel">
                    <div class="eq-type">
                        <button class="active" onclick="setEqType('linear',this)">一元一次</button>
                        <button onclick="setEqType('quadratic',this)">一元二次</button>
                        <button onclick="setEqType('system',this)">二元一次</button>
                    </div>
                    <div id="eqInputs"></div>
                    <button class="action-btn" onclick="solveEquation()">求解</button>
                    <div class="result-panel" id="eqResult">输入系数后点击求解</div>
                </div>

                <!-- ==================== 矩阵运算 ==================== -->
                <div id="matrix" class="panel eq-panel">
                    <div class="eq-type">
                        <button class="active" onclick="setMatrixOp('add',this)">加法</button>
                        <button onclick="setMatrixOp('subtract',this)">减法</button>
                        <button onclick="setMatrixOp('multiply',this)">乘法</button>
                        <button onclick="setMatrixOp('determinant',this)">行列式</button>
                        <button onclick="setMatrixOp('inverse',this)">逆矩阵</button>
                    </div>
                    <div id="matrixInputs"></div>
                    <button class="action-btn" onclick="calculateMatrix()">计算</button>
                    <div class="result-panel" id="matrixResult">选择运算类型并输入矩阵</div>
                </div>

                <!-- ==================== 几何图形 ==================== -->
                <div id="geometry" class="panel eq-panel">
                    <div class="eq-type">
                        <button class="active" onclick="setGeometryType('circle',this)">圆</button>
                        <button onclick="setGeometryType('triangle',this)">三角形</button>
                        <button onclick="setGeometryType('rectangle',this)">矩形</button>
                        <button onclick="setGeometryType('ellipse',this)">椭圆</button>
                        <button onclick="setGeometryType('trapezoid',this)">梯形</button>
                        <button onclick="setGeometryType('polygon',this)">正多边形</button>
                        <button onclick="setGeometryType('sphere',this)">球体</button>
                        <button onclick="setGeometryType('cylinder',this)">圆柱体</button>
                        <button onclick="setGeometryType('cone',this)">圆锥体</button>
                        <button onclick="setGeometryType('torus',this)">圆环体</button>
                    </div>
                    <div id="geometryInputs"></div>
                    <div class="canvas-container">
                        <div class="canvas-label">几何图形可视化</div>
                        <canvas id="geometryCanvas" height="260"></canvas>
                    </div>
                    <button class="action-btn" onclick="calculateGeometry()">计算</button>
                    <div class="result-panel" id="geometryResult">选择几何图形并输入参数</div>
                </div>

                <!-- ==================== 3D 可视化 ==================== -->
                <div id="3d" class="panel eq-panel">
                    <div class="eq-type" id="threeDTypeButtons">
                        <button class="active" data-3dtype="surface">3D曲面</button>
                        <button data-3dtype="vector">向量运算</button>
                        <button data-3dtype="distance">两点距离</button>
                        <button data-3dtype="plane">平面方程</button>
                        <button data-3dtype="line">直线方程</button>
                        <button data-3dtype="curve3d">参数曲线</button>
                    </div>
                    <div id="3dInputs"></div>
                    <div class="canvas-container" style="min-height:360px">
                        <div class="canvas-label">3D 可视化 — 鼠标拖拽旋转，滚轮缩放</div>
                        <canvas id="threeDCanvas" height="360"></canvas>
                    </div>
                    <button class="action-btn" onclick="calculate3D()">计算</button>
                    <div class="result-panel" id="3dResult">输入函数表达式，支持如 sin(x)*cos(y), x^2+y^2 等</div>
                </div>

                <!-- ==================== 微积分 ==================== -->
                <div id="calculus" class="panel eq-panel">
                    <div class="eq-type">
                        <button class="active" onclick="setCalculusType('derivative',this)">导数</button>
                        <button onclick="setCalculusType('integral',this)">积分</button>
                        <button onclick="setCalculusType('limit',this)">极限</button>
                        <button onclick="setCalculusType('series',this)">级数</button>
                        <button onclick="setCalculusType('taylor',this)">泰勒展开</button>
                    </div>
                    <div id="calculusInputs"></div>
                    <button class="action-btn" onclick="calculateCalculus()">计算</button>
                    <div class="result-panel" id="calculusResult">选择微积分运算类型并输入参数</div>
                </div>

                <!-- ==================== 概率统计 ==================== -->
                <div id="statistics" class="panel eq-panel">
                    <div class="eq-type">
                        <button class="active" onclick="setStatType('combination',this)">组合</button>
                        <button onclick="setStatType('permutation',this)">排列</button>
                        <button onclick="setStatType('descriptive',this)">描述统计</button>
                        <button onclick="setStatType('binomial',this)">二项分布</button>
                        <button onclick="setStatType('normal',this)">正态分布</button>
                        <button onclick="setStatType('poisson',this)">泊松分布</button>
                    </div>
                    <div id="statInputs"></div>
                    <button class="action-btn" onclick="calculateStat()">计算</button>
                    <div class="result-panel" id="statResult">选择概率统计运算类型并输入参数</div>
                </div>

                <!-- ==================== 数论 ==================== -->
                <div id="numbertheory" class="panel eq-panel">
                    <div class="eq-type">
                        <button class="active" onclick="setNumTheoryType('prime',this)">素数检测</button>
                        <button onclick="setNumTheoryType('primeFactor',this)">素因数分解</button>
                        <button onclick="setNumTheoryType('gcd',this)">GCD/LCM</button>
                        <button onclick="setNumTheoryType('modpow',this)">模幂运算</button>
                        <button onclick="setNumTheoryType('euler',this)">欧拉函数</button>
                        <button onclick="setNumTheoryType('fibonacci',this)">斐波那契</button>
                    </div>
                    <div id="numTheoryInputs"></div>
                    <button class="action-btn" onclick="calculateNumTheory()">计算</button>
                    <div class="result-panel" id="numTheoryResult">选择数论运算类型并输入参数</div>
                </div>

                <!-- ==================== 代数运算 ==================== -->
                <div id="algebra" class="panel eq-panel">
                    <div class="eq-type">
                        <button class="active" onclick="setAlgebraType('cubic',this)">三次方程</button>
                        <button onclick="setAlgebraType('polynomial',this)">多项式运算</button>
                        <button onclick="setAlgebraType('set',this)">集合运算</button>
                        <button onclick="setAlgebraType('logic',this)">逻辑运算</button>
                        <button onclick="setAlgebraType('sequence',this)">数列求和</button>
                    </div>
                    <div id="algebraInputs"></div>
                    <button class="action-btn" onclick="calculateAlgebra()">计算</button>
                    <div class="result-panel" id="algebraResult">选择代数运算类型并输入参数</div>
                </div>

                <!-- ==================== 应用数学 ==================== -->
                <div id="appliedmath" class="panel eq-panel">
                    <div class="eq-type">
                        <button class="active" onclick="setAppliedType('newton',this)">牛顿法</button>
                        <button onclick="setAppliedType('regression',this)">线性回归</button>
                        <button onclick="setAppliedType('interpolation',this)">拉格朗日插值</button>
                        <button onclick="setAppliedType('numericalIntegral',this)">数值积分</button>
                        <button onclick="setAppliedType('ode',this)">微分方程</button>
                    </div>
                    <div id="appliedInputs"></div>
                    <button class="action-btn" onclick="calculateApplied()">计算</button>
                    <div class="result-panel" id="appliedResult">选择应用数学运算类型并输入参数</div>
                </div>

                <!-- ==================== 趣味计算 ==================== -->
                <div id="fun" class="panel eq-panel">
                    <div class="eq-type">
                        <button class="active" onclick="setFunType('relative',this)">亲戚计算</button>
                        <button onclick="setFunType('loan',this)">房贷车贷</button>
                        <button onclick="setFunType('interest',this)">年化收益</button>
                        <button onclick="setFunType('currency',this)">汇率计算</button>
                        <button onclick="setFunType('number',this)">大写数字</button>
                        <button onclick="setFunType('base',this)">进制计算</button>
                        <button onclick="setFunType('speed',this)">速度计算</button>
                        <button onclick="setFunType('bmi',this)">BMI计算</button>
                        <button onclick="setFunType('tax',this)">个税计算</button>
                    </div>
                    <div id="funInputs"></div>
                    <button class="action-btn" onclick="calculateFun()">计算</button>
                    <div class="result-panel" id="funResult">选择计算类型并输入参数</div>
                </div>

                <!-- ==================== 单位转换 ==================== -->
                <div id="converter" class="panel conv-panel">
                    <div class="conv-category" id="convCats"></div>
                    <div class="conv-row">
                        <label>从</label>
                        <div class="conv-input-row">
                            <input id="convFrom" type="number" value="1" oninput="doConvert()">
                            <select id="convFromUnit" onchange="doConvert()"></select>
                        </div>
                    </div>
                    <div class="conv-swap">
                        <button onclick="swapConv()">⇅</button>
                    </div>
                    <div class="conv-row">
                        <label>到</label>
                        <div class="conv-input-row">
                            <input id="convTo" type="text" readonly class="conv-result-input">
                            <select id="convToUnit" onchange="doConvert()"></select>
                        </div>
                    </div>
                </div>

                <!-- ==================== 历史记录 ==================== -->
                <div id="history" class="panel">
                    <div id="historyList" class="history-empty">暂无计算记录</div>
                </div>

            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/examples/js/controls/OrbitControls.js"></script>
    <script src="app.js"></script>
    <script>
        // ===== 侧边栏导航 =====
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const panelTitle = document.getElementById('panelTitle');

        const panelTitles = {
            basic: '基础计算', scientific: '科学计算', graph: '2D 绘图',
            equation: '方程求解', matrix: '矩阵运算', geometry: '几何图形',
            '3d': '3D 可视化', calculus: '微积分', statistics: '概率统计',
            numbertheory: '数论', algebra: '代数运算', appliedmath: '应用数学',
            fun: '趣味计算', converter: '单位转换', history: '历史记录'
        };

        // 事件委托 — 侧边栏导航
        document.querySelector('.sidebar-nav').addEventListener('click', (e) => {
            const item = e.target.closest('.nav-item');
            if (!item) return;

            const panel = item.dataset.panel;
            if (!panel) return;

            // 更新导航状态
            document.querySelectorAll('.nav-item').forEach(n => {
                n.classList.remove('active');
                n.setAttribute('aria-selected', 'false');
            });
            item.classList.add('active');
            item.setAttribute('aria-selected', 'true');

            // 切换面板
            showPanel(panel);

            // 移动端关闭侧边栏
            if (window.innerWidth <= 768) toggleSidebar();
        });

        // 原有 showPanel 增强
        const _originalShowPanel = window.showPanel;
        window.showPanel = function(name) {
            if (_originalShowPanel) _originalShowPanel(name);
            panelTitle.textContent = panelTitles[name] || name;
        };

        // ===== 主题切换 =====
        function getTheme() {
            return localStorage.getItem('calc-theme') || 'dark';
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('calc-theme', theme);
            document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        function cycleTheme() {
            const current = getTheme();
            applyTheme(current === 'dark' ? 'light' : 'dark');
        }

        // 初始化主题
        applyTheme(getTheme());

        // ===== 侧边栏切换 (移动端) =====
        function toggleSidebar() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('visible');
        }

        // ===== 键盘快捷键 =====
        document.addEventListener('keydown', (e) => {
            // T — 切换主题
            if (e.key === 't' || e.key === 'T') {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                cycleTheme();
                return;
            }

            // 数字键 1-9 快速导航
            if (e.key >= '1' && e.key <= '9' && !e.ctrlKey && !e.metaKey) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                const panels = ['basic', 'scientific', 'graph', 'equation', 'matrix', 'geometry', '3d', 'calculus', 'statistics'];
                const idx = parseInt(e.key) - 1;
                if (panels[idx]) {
                    const navItem = document.querySelector(`[data-panel="${panels[idx]}"]`);
                    if (navItem) navItem.click();
                }
            }
        });
    </script>
</body>
</html>
