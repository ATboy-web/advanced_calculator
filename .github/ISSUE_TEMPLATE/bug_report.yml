name: Bug Report
description: Report a bug in Advanced Calculator
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform are you using?
      options:
        - Electron (Windows)
        - Android APK
        - Web Browser
        - Flutter
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What version are you using?
      placeholder: "v2.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the bug
      placeholder: Tell us what happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots

  - type: dropdown
    id: module
    attributes:
      label: Affected Module
      description: Which calculator module is affected?
      options:
        - Basic Calculator
        - Scientific Calculator
        - Graphing
        - Equation Solver
        - Matrix
        - Geometry
        - 3D Visualization
        - Calculus
        - Statistics
        - Number Theory
        - Algebra
        - Applied Math
        - Fun Calculations
        - Unit Converter
        - Other
