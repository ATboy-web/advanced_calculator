name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Build Debug APK
        if: ${{ inputs.build_type == 'debug' }}
        working-directory: android-apk
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build Release APK
        if: ${{ inputs.build_type == 'release' }}
        working-directory: android-apk
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Debug APK
        if: ${{ inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: advanced-calculator-debug
          path: android-apk/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        if: ${{ inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: advanced-calculator-release
          path: android-apk/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
