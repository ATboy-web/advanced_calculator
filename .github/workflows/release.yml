name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-electron:
    name: Build Electron App
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: electron-calculator
        run: npm ci

      - name: Build Windows app
        working-directory: electron-calculator
        run: npm run build:win
        continue-on-error: true

      - name: Upload Electron artifact
        uses: actions/upload-artifact@v7
        with:
          name: electron-app
          path: electron-calculator/dist/
          retention-days: 5
        continue-on-error: true

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: android-apk
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: android-apk/app/build/outputs/apk/debug/app-debug.apk

  release:
    name: Create Release
    needs: [build-apk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }} - Advanced Calculator
          body: |
            ## Advanced Calculator ${{ github.ref_name }}

            ### Downloads
            - **Android APK**: Download `app-debug.apk` below
            - **Source Code**: Source code (zip) / Source code (tar.gz)

            ### Features
            - 15 Calculator Modules (Basic, Scientific, Graphing, Equation, Matrix, Geometry, 3D, Calculus, Statistics, Number Theory, Algebra, Applied Math, Fun, Converter, Tutorial)
            - 3D Visualization (Three.js)
            - Math Tutorials (Algebra, Calculus, Geometry, Probability, Linear Algebra, Trigonometry)
            - Multi-language Support (中文/English/हिन्दी/Español)
            - Improved Input Labels with Descriptions
            - Unit Converter (8 categories)
          files: |
            app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
