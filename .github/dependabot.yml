# Dependabot 配置 - 自动依赖更新
version: 2
updates:
  # npm 依赖 (Electron 应用)
  - package-ecosystem: "npm"
    directory: "/electron-calculator"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "electron-app"
    commit-message:
      prefix: "deps"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci-cd"
    commit-message:
      prefix: "ci"

  # Gradle (Android)
  - package-ecosystem: "gradle"
    directory: "/android-apk"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "android-app"
    commit-message:
      prefix: "deps"
